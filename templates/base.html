<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Premium</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --border-card: rgba(255, 255, 255, 0.1);
            --neon-accent: #38bdf8;
            --neon-gradient: linear-gradient(135deg, #38bdf8, #818cf8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #34d399;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.08), transparent 25%);
        }

        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-card);
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--neon-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header a {
            color: var(--neon-accent);
            text-decoration: none;
            font-weight: 600;
            margin-left: 1.5rem;
            transition: opacity 0.3s ease;
        }

        header a:hover {
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        main {
            flex: 1;
            padding: 3rem 5%;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .messages {
            list-style: none;
            margin-bottom: 2rem;
        }

        .messages li {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 600;
            animation: slideIn 0.4s ease-out;
            border: 1px solid var(--border-card);
        }
        
        .messages li.success { background: rgba(52, 211, 153, 0.1); color: var(--success); border-color: var(--success); }
        .messages li.error { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: var(--danger); }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Forms */
        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-card);
            color: var(--text-main);
            border-radius: 6px;
            margin-top: 0.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        button {
            background: var(--neon-gradient);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--neon-accent);
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-card);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <h1><a href="/" style="all:unset; cursor:pointer;">ReservaTech</a></h1>
        <div class="user-actions">
            {% if user.is_authenticated %}
                <span style="color: var(--text-muted);">Hola, {{ user.username }}</span>
                <a href="/admin/">Panel Admin</a>
            {% else %}
                <a href="/admin/">Iniciar Sesión</a>
            {% endif %}
        </div>
    </header>

    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
